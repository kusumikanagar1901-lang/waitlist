<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJECT MONKEYMAN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

background:#05070d;
color:white;
overflow:hidden;

}

canvas{

position:fixed;
top:0;
left:0;
z-index:-1;

}

.container{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;

}

.card{

width:100%;
max-width:520px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.08);

padding:40px;

border-radius:24px;

box-shadow:0 0 80px rgba(0,255,255,.08);

}

.logo{

color:#68f5ff;

letter-spacing:5px;

font-size:13px;

margin-bottom:18px;

}

h1{

font-size:40px;

margin-bottom:10px;

}

.subtitle{

opacity:.65;

margin-bottom:35px;

line-height:1.7;

}

button{

background:#68f5ff;

color:#000;

padding:16px 28px;

border:none;

font-size:17px;

border-radius:14px;

cursor:pointer;

font-weight:700;

transition:.3s;

}

button:hover{

transform:scale(1.05);

}

.typing{

font-family:monospace;

font-size:15px;

opacity:.8;

margin-bottom:25px;

min-height:22px;

}

.footer{

margin-top:30px;

opacity:.45;

font-size:12px;

}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="card">

<div class="logo">

PROJECT MONKEYMAN

</div>

<div class="typing" id="typing">

</div>

<h1>

Recruitment Portal

</h1>

<div class="subtitle">

Applicant verification required.

Only authorised candidates may continue.

</div>

<button onclick="boot()">

INITIALIZE

</button>

<div class="footer">

Recruitment AI v3.7

</div>

</div>

</div>

<script>

const text="Initializing Kusumika AI...";

let i=0;

function type(){

if(i<text.length){

document.getElementById("typing").innerHTML+=text.charAt(i);

i++;

setTimeout(type,70);

}

}

type();

function boot(){

alert("Loading sequence coming in Part 2 🚀");

}

const canvas=document.getElementById("bg");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<140;i++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2

});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#67f5ff";

stars.forEach(s=>{

ctx.beginPath();

ctx.arc(s.x,s.y,s.r,0,Math.PI*2);

ctx.fill();

s.y+=.2;

if(s.y>canvas.height)s.y=0;

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>

</html>
